services:
  postgres:
    image: postgres:18
    container_name: parking_service_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: public
    ports:
      - "6020:5432"
    volumes:
      - parking_service_data:/var/lib/postgresql

volumes:
  parking_service_data: